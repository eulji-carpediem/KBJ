<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#" method="post">
    <fieldset>
        <legend>기본 정보</legend>

            <label for="id">아이디:</label>
            <input type="text" minlength="4" maxlength="12" name="id">
            <br>
            <label for="password">비밀번호:</label>
            <input type="password" id="password" name="password"><br>
            <label for="email">이메일:</label>
            <input type="email" id="email" name="email">
            <br>
    </fieldset>
    </form>
    <form action="#" method="post">
    <fieldset>
        <legend>추가 정보</legend>
        <label for="work">직업:</label>
        <select id="work" name="work">
            <option value="default" selected>선택하세요 </option>
            <option value="student">학생</option>
            <option value="teacher">선생님</option>
            <option value="engineer">엔지니어</option>
        </select> <br><br>
        <label for="hobby">관심 분야:</label> <br>
        <input type="checkbox" id="hobby1" name="hobby" value="music">
        <label for="hobby1">음악</label>
        <input type="checkbox" id="hobby2" name="hobby" value="movie">
        <label for="hobby2">영화</label>
        <input type="checkbox" id="hobby4" name="hobby" value="reading">
        <label for="hobby4">독서</label>
        <input type="checkbox" id="hobby3" name="hobby" value="exercise">
        <label for="hobby3">운동</label>
        <input type="checkbox" id="hobby5" name="hobby" value="travel">
        <label for="hobby5">여행</label>
    </fieldset>
    </form>
    <form action="#" method="post">
    <fieldset>
        <legend>자기 정보</legend>
        <label for="self">자기소개:</label><br>
        <textarea style="resize:none;" id="self" name="self" rows="5" cols="30"></textarea>
        <br>
        <label for="picture"> 프로필 사진:</label>
        <input type="file" id="picture" name="picture">
    </fieldset>
    </form><br>
    <form action="#" method="post">
        <input type="submit" value="가입하기">
        <input type="reset" value="다시 작성">
    </form>

    


    <br> <br> <br> <br>
</body>
</html>
