<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    h1 {
        color: red;
    }
    /* ul 태그 배경 색깔 하늘색으로 만들기 */
    ul {
        background-color: skyblue;
    }
    /* p 태그 글자 색깔 초록색으로 만들기 */
    p:first-child {
            color : orange;
        }
    /* div 태그 후손 중 2n에 해당하는 애들만 짧은 배경 노란색으로 */
    div p:nth-child(2n) {
        background-color: yellow;
    }
    /* 태그 뒤에 공간을 선택 */
    div p::after {
         background-color: white;
    }
    
</style>
<body>
    <h1>웹 개발 입문</h1> <br>
    <ul id="default-bullet">
        <li>홈</li>
        <li>소개</li>
        <li>서비스</li>
        <li>연락처</li>
    </ul> <br>
    <h2> 웹 개발의 기초</h2>
    <div id="test1">
    <p> 웹 개발을 시작하는 첫 걸음입니다.</p>
    <p>HTML</p>
    <p>구조를 만듭니다.</p>
    <p>CSS</p>
    <p>디자인을 입힙니다.</p>
    <p>JavaScript</p>
    </div>

</body>
</html>
