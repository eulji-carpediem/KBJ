<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 페이지</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 50px; font-family: "맑은 고딕", sans-serif; }

        h1 {
            font-size: 32px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        input {
            width: 400px;
            height: 50px;
            border: 1px solid #ccc;
            border-radius: 10px; 
            margin-bottom: 25px; 
            padding-left: 15px; 
        }

        .login-btn {
            width: 400px;
            height: 60px;
            background-color: #18773f; 
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <h1>로그인</h1>

    <div>
        <label>아이디</label>
        <input type="text">
    </div>

    <div>
        <label>비밀번호</label>
        <input type="password">
    </div>

    <button class="login-btn">로그인</button>

</body>
</html>
