<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가로형 박스 레이아웃</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            justify-content: center;
            padding-top: 100px;
            background-color: #f5f5f5;
        }

        /* 가로로 넓은 핑크색 박스 */
        .box {
            display: flex;
            align-items: center; 
            justify-content: center; 
            background-color: #fb7171;
            width: 500px; 
            height: 60px; 
            border-radius: 5px;
            gap: 25px; /
        }
        .text {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #dacfcf;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="box">
        <span class="text">웹툰홈</span>
        <div class="dot"></div>
        <span class="text">요일별웹툰</span>
        <div class="dot"></div>
        <span class="text">베스트도전</span>
    </div>

</body>
</html>
