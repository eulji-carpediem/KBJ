<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        * { box-sizing: border-box; margin: 0; padding: 0; }

        .container {
            width: 250px;
            height: 150px;
            background: #FFB9B9;
            border-radius: 8px 8px 0px 0px;
        }

        .box {
            width: 250px;
            height: 75px;
            padding: 6px 8px 6px 8px;
            background-color: #ffffff;
            border-color: #FFB9B9;
            border : solid #FFB9B9;
            display: flex;
        }

        .text {
            margin-bottom: 15px;
            font-size: 12px;
            color: #000000;

        }


        .circle-text-box{
            width: 66px;
            height: 40px;
        }
        .circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: rgb(42, 42, 42);
            border: 1px solid #000;
        }

        .name {
            font-size: 13px;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box"></div>

        <div class="info-area">
            <span class="text">안녕하세요. 텍스트입니다.</span>
            
            <div class="circle-text-box">
                <div class="circle"></div>
                <span class="name">휴양조</span>
            </div>
        </div>
    </div>

</body>
</html>
