<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { box-sizing: border-box; }

        .img-container{
            width: 320px;
            height: 320px;
            margin: 12px;
            background-image: url("assets/images/city2.jpg");
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-content: space-between;
        }

        .text{
            width: 161px;
            height: 29px;
            margin: 16px;
            color: white;
            font-weight: 700;
            font-family: 'Inter';
            font-style: normal;
            font-size: 24px;
            /* 인테리어 디자인 */

        }
        .box1{
            width: 30px;
            height: 30px;
            margin: 20px;  /*16px 정도 주니까 옆으로 안밀려나서*/
            border-radius: 50%;
            background-color: #E3FF92;
        }
        .box2{
            width: 30px;
            height: 30px;
            margin: 20px;
            border-radius: 50%;
            background-color: #92F8FF;

        }
        .box3{
            width: 30px;
            height: 30px;
            margin: 20px;
            border-radius: 50%;
            background-color: #FF9292;
        }
    </style>
</head>
<body>
        <div class="img-container">
            <div class="text">인테리어 디자인</div>
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box3"></div>
        </div>

</body>
</html>
