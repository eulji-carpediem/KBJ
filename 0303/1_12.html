<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { box-sizing: border-box; }

        .img-container{
            width: 192px;
            height: 128px;
            background-image: url('assets/images/city2.jpg');
            background-size: cover;
            background-position: center;
            position: relative; /* overlay 기준 */
            overflow: hidden;   /* overlay가 바깥으로 안 나가게 */
        }

        .img-container .text{
            left: 0;
            right: 0;
            bottom: 0;
            
        
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 14px;
            font-weight: bold;
        }
        .box1{
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border : solid blue;
            background-color: rgb(255, 0, 0);
            position: absolute;
            left: 5;
            right: 0;
            bottom: 0;
        }
        .box2{
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border : solid rgb(132, 197, 175);
            background-color: rgb(46, 246, 129);
            position: absolute;
            /* 여기 원 조금 짤린거 아쉽다. */
            left: 5;
            right: 0;
            bottom: -1;
        }
        .box3{
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border : solid rgb(246, 165, 67);
            background-color: rgb(170, 12, 184);
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
        }
    </style>
</head>
<body>
        <div class="img-container">
            <div class="text"> 인테리어 디자인

        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
            </div>
        </div>



</body>
</html>
