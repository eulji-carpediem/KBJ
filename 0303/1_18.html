<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        * { box-sizing: border-box; }

        .container {
            width: 332px;
            height: 100px;
            background-color: #FFE4E4;  
            border-radius: 8px;
            padding: 0px;
            margin: 50px
        }
        .left-box {
            width: 160px;
            height: 100px;
            background-color: #ffb1b1;
            border-radius: 8px;
            float : left;
        }

        .right-content {
            float: left;
            margin-left: 20px;
            padding-top: 10px;
        }

        .right-small-box {
            width: 96px;
            height: 19px;
            background-color: #FFB9B9;
            color: white;
            padding: 2px;
            border-radius: 2px;
            font-size: 12px;

        }
      
        .title {
            font-size: 16px;
            color: #000000;
        }

        .text {
            font-size: 14px;
            color: #8B8B8B;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-box"></div>

        <div class="right-content">
            <div class="right-small-box">반가워요!</div>
            <div class="title">좋은하루 보내세요!</div>
            <div class="text">날씨가 좋네요!</div>
        </div>
    </div>

</body>
</html>
