<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { box-sizing: border-box; }

        .img-container{
            width: 160px;
            height: 240px;
            margin: 16px;
            background: #CA785C;
            border-radius: 4px;
            display: flex;
            flex-wrap: wrap;
        }
        .box {
            width: 160px;
            height: 172px;
            background-image: url('assets/images/city2.jpg');
            border-radius: 4px 4px 0 0;
        }

        .text{
            width: 160px;
            height: 19px;
            color: #fff;
            font-family: 'Inter';   /*어떤폰트?*/
            font-style: normal;  /*기울기*/
            font-weight: 700;
            font-size: 16px;
            padding-left: 10px;
        }

        .author{
            width: 60px;
            height: 17px;
            font-family: Inter;
            font-weight: 700;
            font-size: 14px;
            color: white;
            padding-left: 10px;
        }
        .date{
            width: 100px;
            height: 17px;
            font-family: Inter;
            font-weight: 700;
            font-size: 14px;
            color: white;
            padding-right: 6px;
            text-align:end;
        }
    </style>
</head>
<body>
        <div class="img-container">
            <div class="box"></div>
            <div class="text">인테리어란?</div>
            <div class="author">김작가</div>
            <div class="date">2024.01.01</div>
        </div>    
</body>
</html>
