<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { box-sizing: border-box; }

        .img-container{
            width: 150px;
            height: 250px;
            background-image: url('assets/images/city2.jpg');
            background-size: cover;
            background-position: center;
            position: relative; /* overlay 기준 */
            overflow: hidden;   /* overlay가 바깥으로 안 나가게 */
        }

        .img-container .text{
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 35%;
        
            background: rgba(255, 168, 6, 0.75); /* 선택: 살짝 오렌지 톤 */
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
        <div class="img-container">
            <div class="text"> 
                <h3>인테리어란?</h3>
            <p> 2026_03_03</p></div>
        </div>

</body>
</html>
