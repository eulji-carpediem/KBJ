<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { box-sizing: border-box; }

        .img-container{
            width: 200px;
            height: 300px;
            background-image: url('assets/images/city2.jpg');
            background-size: cover;
            background-position: center;
            position: relative; /* overlay 기준 */
            overflow: hidden;   /* overlay가 바깥으로 안 나가게 */
        }

        .img-container .text{
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 35%;
        
            background: rgb(67, 67, 67); /* 선택: 살짝 오렌지 톤 */
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10px;
            font-size: 14px;
        }

            .img-container .author{

            color: #fff;
            display: flex;
            justify-content: flex-start;
            align-content: flex-end;
            
            padding: 0 10px;
            font-size: 14px;
        }
            .box{
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border : solid rgb(98, 98, 98);
            background-color: rgb(78, 78, 78);
            position: absolute;
            /* 여기 원 조금 짤린거 아쉽다. */
            left: 5;
            right: 0;
            bottom: -1;
            z-index: 99;
        }
    </style>
</head>
<body>
        <div class="img-container">
            <div class="box"></div>
            <div class="text"> 새로운 시작!
                <div class="author">김작가</div>
            </div>

        </div>

</body>
</html>
