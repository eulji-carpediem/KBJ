<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sementic과 flex를 사용해서 사이트를 만들어보자</title>
</head>
<body>

    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        

        header {
            background-color: #333;
            color: white;
            padding: 20px;
        }

        nav ul {
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin-right: 10px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        main {
            background-color: lightcoral;
            display: flex 1;
            display: flex;
            flex-direction : row;
            border :#b27b7b
        }
            nav, aside {
            width: 250px;
            background-color: #264c96;
            padding: 20px;
            border-left: 1px solid #291f1f;
            border-right: 1px solid #440f0f;
            border : blue;
            margin-top: 10px;
            display: flex;
        }
        .flex-container {
            display: flex;
            flex: 1; /* header, footer 제외 남는 높이 전체 차지 */
        }
        #default-bullet {
            list-style-type: disc;
        }
        /* footer 스타일 넣기 */
        footer {
            background-color: #291f1f;
            color : white;
            align-items: center;
            
        }
            .dashed-box {
            border: 1px dashed #a0c4ff;
            background-color: #f4f9ff;
            padding: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
        }


    </style>
    <header>
        <h1>머리부(Header)</h1>
    </header>
        <section>
    <div class="flex-container">네비게이션(Nav)
        <nav>
        <ul id="default-bullet">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        </nav>
    <main>
            <h2>메인 콘텐츠(Main)</h2>
            <div class="dashed-box">
                <p>양옆은 고정폭, 가운데는 가변폭!</p>
                </div>
                <!-- 1번 아이템과 2번아이템은 줄바꿈이 되어야 한다. -->
                    <p>Hint. 가운데 영역은 flex: 1로 남는 공간을 차지합니다.</p>
        </main>


        <aside>
            <div class="flex-container">사이드바(Aside)</div>
            <p>공지/광고/프로필 등</p>
        </aside>
        </section>
    </div>

    

    <footer>
        <div class="flex-container">바닥부(Footer)</div>
    </footer>
</body>
</html>
