<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM & DOM Form 연습 (최종 완성본)</title>
    <style>
        .lightgray { background: lightgray; }
        .focused { outline: 3px dashed yellow; }
    </style>
</head>
<body>
    <form name="memberjoin">

        <label for="username">이름</label><br>
        <input type="text" name="username" id="username" placeholder="이름을 입력하세요" required>

        <br><br>

        <label for="email">이메일</label><br>
        <input type="email" name="email" id="email" placeholder="example@domain.com" required>

        <br><br>

        <label>성별</label>
        <input type="radio" name="gender" id="male" value="m" checked><label for="male">남자</label>
        <input type="radio" name="gender" id="female" value="f"><label for="female">여자</label>

        <br><br>

        <label>참여 일자 선택</label>
        <select id="age" name="age">
            <option value="0" selected disabled>- 날짜 선택 -</option>
            <option value="11">2026년 3월 11일</option>
            <option value="12">2026년 3월 12일</option>
            <option value="13">2026년 3월 13일</option>
        </select>

        <br><br>

        <label>요청사항</label><br>
        <textarea name="introduce" placeholder='요청사항을 입력하세요.' id="introduce" rows="5" cols="30" 
        style="resize: none;" maxlength="500"></textarea><br> <!--구글링-->
        <span id="charCount">0</span>/500자

        <br><br>
        <input type="checkbox" name="agree" id="agree"><b>개인정보 수집에 동의합니다</b><br>
        <input type="submit" name="go" value="신청하기">
    </form>

    <script>
        const $form = document.forms.memberjoin;
        const $age = $form.age;
        const $introduce = $form.introduce;
        const $agree = $form.agree;

        $form.addEventListener('focusin', (e) => e.target.classList.add('focused'));
        $form.addEventListener('focusout', (e) => e.target.classList.remove('focused'));

        $introduce.addEventListener('input', (e) => {
            let len = e.target.value.length;
            document.getElementById('charCount').textContent = len;
        });

        $agree.addEventListener('change', (e) => {
            const boldText = $agree.nextElementSibling; 
            if (e.target.checked) {
                boldText.classList.add('agreed-text');
            } else {
                boldText.classList.remove('agreed-text');
            }
        });


        $form.addEventListener('submit', (e) => {
            if ($age.value === "0") {
                alert("참여 일자를 선택해주세요!");
                e.preventDefault(); // 새로고침 방지
                $age.focus();       
                return;           
            }


            if (!$agree.checked) {
                alert("개인정보 수집에 동의하셔야 신청이 가능합니다.");  // 알트말고 필수항목으로 넣기 누락..
                e.preventDefault(); // 제출 방지
                $agree.focus();
                return;
            }


            alert("신청이 성공적으로 완료되었습니다!");
        });
    </script>
</body>
</html>
