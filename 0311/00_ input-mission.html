<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM & DOM Form 연습</title>
    <style>
        .lightgray { background: lightgray; }
        .focused { outline: 3px dashed yellow; }
    </style>
</head>
<body>
    <form name="memberjoin">

        <label for="username">이름</label><br>
        <input type="text" name="username" id="username" placeholder="이름을 입력하세요">

        <br><br>

        <label for="email">이메일</label><br>
        <input type="text" name="email" id="email" placeholder="example@domain.com">

        <br><br>

        <label>성별</label>
        <input type="radio" name="gender" id="male" value="m" checked><label for="male">남자</label>
        <input type="radio" name="gender" id="female" value="f"><label for="female">여자</label>

        <br><br>

        <label>참여 일자 선택</label>
        <select id="age" name="age">
            <option value="0" selected disabled>- 날짜 선택 -</option>  <!--selected로 기본값 잡되, 날짜선택늘 누르면  disabled로 입력 다시 막기.-->
            <option value="11">2026년 3월 11일</option>
            <option value="12">2026년 3월 12일</option>
            <option value="13">2026년 3월 13일</option>
        </select>

        <br><br>

        <label>요청사항</label><br>
        <textarea name="introduce" placeholder='요청사항을 입력하세요.' id="introduce" rows="5" cols="30" 
        style="resize: none;"></textarea><br>
        <span id="charCount">0</span>/500자

        <br><br>
        <input type="checkbox" name="agree" id="agree"><b>개인정보 수집에 동의합니다</b><br>
        <input type="submit" name="go" value="신청하기">
    </form>

    <script>
        // form 취득
        // console.log(document.forms);
        // console.log(document.forms.memberjoin);
        // console.log(document.forms[0]);

        const $form = document.forms.memberjoin;

        // form 태그에서 요소를 가져올 때는 id가 아니라 name을 주로 사용한다.
        console.log($form.elements);
        console.log($form.elements.username);


        // (참고: focus/blur는 버블링이 안 되지만 focusin/focusout은 버블링이 된다.)
        $form.addEventListener('focusin', (e) => e.target.classList.add('focused'));
        $form.addEventListener('focusout', (e) => e.target.classList.remove('focused'));
        

    </script>


    <script>
        $age.addEventListener('change', () => alert('age change !'));
        $introduce.addEventListener('change', () => alert('introduce change!'));
    </script>

</body>
</html>
