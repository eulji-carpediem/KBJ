<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       .container {
        border: 1px solid black;
        padding: 10px;
        margin: 10px;
      }
      .original {
        background: lightblue;
        padding: 10px;
        margin: 5px;
        border: 2px solid blue;
      }
      .clone {
        background: lightgreen;
        padding: 10px;
        margin: 5px;
        border: 2px solid green;
      }

    </style>
</head>
<body>
    <div class="container">
      <div id="original" class="original">
        <h3> 원본 요소 </h3>
        <p> 자식 요소 1 </p>
        <span> 자식 요소 2 </span>
      </div>
    </div>

    <div id="result" class="container">
      <h3> 복제된 요소들이 여기 추가됩니다. </h3>
    </div>

    <button onclick="clone1()"> 파라미터 : false </button>
    <button onclick="clone2()"> 파라미터 : true </button>
    <button onclick="cloneDelete()"> 복제본 제거 </button>


<script>
  function clone1() {
    const $original = document.getElementById("original");
    const $result = document.getElementById("result");

    const $clone = $original.cloneNode(false); 
    $clone.className = "clone";
    $clone.textContent = "파라미터 : false";

    $result.appendChild($clone);
  }

  function clone2() {
    const $original = document.getElementById("original");
    const $result = document.getElementById("result");

    const $clone = $original.cloneNode(true); 
    $clone.className = "clone";

    $result.appendChild($clone);
  }

  function cloneDelete() {
    const $result = document.getElementById("result");
    const $cloneAll = $result.querySelectorAll(".clone");
    $cloneAll.forEach(($clone) => $clone.remove());
  }
</script>
</body>

</html>
