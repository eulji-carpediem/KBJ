<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      .box {
        background: red;
        color: white;
        padding: 10px;
        margin: 5px;
      }
      .new1 {
        background: green;
        color: white;
        padding: 10px;
        margin: 5px;
      }
      .new2 {
        background: green;
        color: white;
        padding: 10px;
        margin: 5px;
        font-weight: bold;
      }
    </style>
</head>
<body>
    <div>
      <p class="box" id="target1"> 교체될 요소1 </p>
      <p class="box" id="target2"> 교체될 요소2 </p>
      <p class="box" id="target3"> 교체될 요소3 </p>
    </div>

    <button onclick="replaceWithElement();"> 요소로 교체 </button>
    <button onclick="replaceWithText();"> 텍스트로 교체 </button>
    <button onclick="replaceWithHTML();"> HTML로 교체 </button>

    <script>
        function replaceWithElement(){
            const $target = document.getElementById("target1");
            const $newElement = document.createElement("div");
            $newElement.textContent = "새로운 요소로 교체됨"; // textContent로
            $newElement.className = "new1";
            $target.replaceWith($newElement);

        }

        function replaceWithText(){
            const $target = document.getElementById("target2");
            $target.replaceWith("단순 텍스트로 교체됨");

        }

      function replaceWithHTML() {
        const $target = document.getElementById("target3");
        const $newDiv = document.createElement("div");
        $newDiv.innerHTML = "<p>HTML 요소로 교체됨<p>";  //textContent와 달리 html요소 사용가능하긴함
        $newDiv.className = "new2";

        $target.replaceWith($newDiv);
        }
    </script>
    
</body>
</html>
