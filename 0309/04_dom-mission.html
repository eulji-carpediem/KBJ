<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
      }

      .container {
        border: 2px solid #ddd;
        padding: 20px;
        margin: 15px 0;
        border-radius: 8px;
      }

      .box {
        padding: 10px;
        margin: 8px 0;
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .special {
        background-color: #fff3cd;
        border-color: #ffeaa7;
      }

      ul li {
        padding: 5px;
        margin: 3px 0;
      }

      button {
        padding: 10px 15px;
        margin: 5px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 14px;
      }

      button:hover {
        background-color: #0056b3;
      }
    </style>
</head>
<body>
    <div class="container">
      <h2 id="title">제목 영역</h2>
      <p class="box">첫 번째 박스</p>
      <p class="box">두 번째 박스 (특별)</p>
      <p class="box">세 번째 박스</p>
    </div>

    <div class="container">
      <ul>
        <li>첫 번째 목록</li>
        <li>두 번째 목록 (특별)</li>
        <li>세 번째 목록</li>
        <li>네 번째 목록</li>
      </ul>
    </div>

    <div class="container">
      <input type="text" placeholder="텍스트 입력" />
      <input type="email" placeholder="이메일 입력" />
      <button type="button">일반 버튼</button>
    </div>

    <div style="margin-top: 20px">
      <button onclick="selectById()">ID로 선택</button>
      <button onclick="selectByClass()">클래스로 선택</button>
      <button onclick="selectByTag()">태그로 선택</button>
      <button onclick="selectSpecial()">특별 클래스 선택</button>
      <button onclick="selectFirst()">첫 번째만 선택</button>
      <button onclick="selectAll()">모든 박스 선택</button>
      <button onclick="selectComplex()">복합 선택자</button>
      <button onclick="selectInput()">입력 필드 선택</button>
    </div>
    
    <script>
        function selectById(){
            const $selectById =document.getElementById('title');
            $selectById.innerHTML = "ID로 선택된 제목!";
            $selectById.style.color = "#dc3545";
        }
        function selectByClass(){
            const $selectByClass =document.getElementsByClassName('box')[0];
            $selectByClass.innerHTML ="클래스로 선택된 첫 번째 박스!";
            $selectByClass.style.backgroundColor="lightgreen";
            $selectByClass.style.border= "blue"
        }
        function selectByTag(){
            const $selectByTag =document.getElementsByTagName('p')[0];
            $selectByTag.style.backgroundColor="green";
            $selectByTag.innerHTML = "태그로 선택된 첫번째 p 요소";
            $selectByTag.style.borderColor = "#blue";
        }
        function selectSpecial(){
            const $selectSpecial = document.getElementsByClassName("box")[1];
            const $selectSpecial2 = document.querySelectorAll("ul > li")[1];

            $selectSpecial.style.backgroundColor = "yellow";
            $selectSpecial.innerHTML = " 특별 클래스 1번!";
            $selectSpecial2.style.backgroundColor = "yellow";
            $selectSpecial2.innerHTML = " 특별 클래스 2번!";
            }

        function selectFirst(){
            const $selectFirst=document.querySelector(".container .box");
            $selectFirst.innerHTML = "첫 번째 컨테이너의 첫 번째 박스!";
            $selectFirst.style.backgroundColor = "blue";
        }
        function selectAll(){
            const $selectAll=document.querySelectorAll(".box");
            for (var i = 0; i < 3; i++) {
          $selectAll[i].innerHTML = "모든 박스 " + (i + 1) + "번 변경!";
          $selectAll[i].style.backgroundColor = "pink";
        }
      }
        function selectComplex(){  //복합선택자를 찾아보기.
            const $selectComplex=document.querySelectorAll(".box");
            $selectComplex[0].style.backgroundColor = "lightgreen";
            $selectComplex[0].style.border = "2px dashed green";
            $selectComplex[0].innerHTML = "복합 선택자로 선택됨.";
            $selectComplex[2].style.backgroundColor = "lightgreen";
            $selectComplex[2].style.border = "2px dashed green";
            $selectComplex[2].innerHTML = "복합 선택자로 선택됨.";  // 각각 선택으로 때우기.
        }

        function selectInput() {
            const $selectInput = document.querySelector('input[type="text"]');
            const $selectInput2 = document.querySelector('input[type="email"]');

            $selectInput.value = "querySelector로 설정된 값";
            $selectInput.style.backgroundColor = "orange";

            $selectInput2.value = "test@example.com";
            $selectInput2.style.backgroundColor = "lightblue";
      }
    </script>
</body>
</html>
