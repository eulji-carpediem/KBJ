<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;}
      body {
        font-family: Arial, sans-serif;
        max-width: 500px;
        margin: 50px auto;
        padding: 20px;
      }

      .box {
        padding: 20px;
        margin: 10px 0;
        border: 2px solid #ccc;
        border-radius: 5px;
      }
      li {
        padding: 5px;
        margin: 3px 0;
      }
        #list {
            list-style-type: disc;
        }

      button {
        padding: 10px 20px;
        margin: 5px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }

      button:hover {
        background-color: #0056b3;
      }
    </style>
</head>
<body>
    <div id="box1" class="box">첫 번째 문단입니다.</div>
    <div id="box2" class="box">두 번째 문단입니다.</div>
    <div id="box3" class="box">세 번째 문단입니다.</div>

    <ul id="list">
    <li> 첫 번째 목록</li>
    <li> 두 번째 목록</li>
    <li> 세 번째 목록</li>
    <li> 네 번째 목록</li>
    </ul>

    <button onclick="changeAllBox();">모든 문단 선택</button>
    <button onclick="changeAllList();">모든 목록 선택</button>
    <button onclick="changeFirstBox();">첫 번째 문단만 선택</button>

    <script>
        function changeAllBox(){
            const $changeAllBox = document.getElementsByClassName("box");
            for (var i = 0; i < 3; i++) {
                $changeAllBox[i].innerHTML = "선택된 문단 " + (i + 1);
                $changeAllBox[i].style.backgroundColor = "yellow";
            }
        }

        function changeAllList(){
            const $changeAllList = document.querySelectorAll("#list > li");
            for (var i = 0; i < 4; i++) {
                $changeAllList[i].innerHTML = "새로운 목록 항목 " + (i + 1)
                $changeAllList[i].style.color = "lightblue";
                $changeAllList[i].style.fontWeight = "bold";
            }
        }

        function changeFirstBox(){
            const $firstBox = document.getElementById("box1");
            $firstBox.style.backgroundColor = "lightgreen";
        }
    </script>
</body>
</html>
