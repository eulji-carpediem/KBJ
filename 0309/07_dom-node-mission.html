<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
      .container {
        border: 2px solid red;
        padding: 15px;
        margin: 10px;
      }
      .box {
        background: lightcoral;
        padding: 10px;
        margin: 5px;
        border: 1px solid darkred;
      }

    </style>
</head>
<body>
    <div class="container" id="container">
    <div class="box" id="delete1">삭제할 자식1</div>
    <div class="box" id="delete2">삭제할 자식2</div>
    <div class="box" id="delete3">삭제할 자식3</div>
    <div class="box" id="delete4">삭제할 자식4</div>
    </div>

    <button onclick="remove1()">첫 번째 자식 삭제버튼</button>
    <button onclick="remove2()">두 번째 자식 삭제버튼</button>
    <button onclick="remove3()">세 번째 자식 삭제버튼</button>
    <button onclick="remove4()">마지막 번째 자식 삭제버튼</button>

    <script>
        function remove1(){
            const $remove = document.getElementById("delete1");
            container.removeChild($remove);
        }
                function remove2(){
            const $remove = document.getElementById("delete2");
            container.removeChild($remove);
        }
                function remove3(){
            const $remove = document.getElementById("delete3");
            container.removeChild($remove);
        }
                function remove4(){
            const $remove = document.getElementById("delete4");
            container.removeChild($remove);
        }
    </script>

</body>
</html>
