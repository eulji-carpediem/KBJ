<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      .container {
        border: 2px solid blue;
        padding: 10px;
        margin: 10px;
      }
      .old {
        background: red;
        color: white;
        padding: 5px;
        margin: 3px;
      }
      .new {
        background: green;
        color: white;
        padding: 5px;
        margin: 3px;
      }
    </style>
</head>
<body>
    <div id="container">
      <p class="old" id="target1"> 교체될 자식 1 </p>
      <p class="old" id="target2"> 교체될 자식 2 </p>
      <p class="old" id="target3"> 교체될 자식 3 </p>
    </div>

    <button onclick="replaceFirst();"> 첫 번째 교체 </button>
    <button onclick="replaceSecond();"> 두 번째 교체 </button>
    <button onclick="replaceThird();"> 세 번째 교체 </button>

    <script>
        function replaceFirst(){
            const $container = document.getElementById("container");
            const $target = document.getElementById("target1");
            const $newElement = document.createElement("div");
            $newElement.textContent = "새로운 첫번째 자식"; // textContent로
            $newElement.className = "new";
            $container.replaceChild($newElement,$target);  // (새로운, 기존)

        }

        function replaceSecond(){
            const $container = document.getElementById("container");
            const $target = document.getElementById("target2");
            const $newElement = document.createElement("span");
            $newElement.textContent = "새로운 두번째 자식"; // textContent로
            $newElement.className = "new";
            $container.replaceChild($newElement,$target);

        }

      function replaceThird() {
            const $container = document.getElementById("container");
            const $target = document.getElementById("target3");
            const $newElement = document.createElement("h4");
            $newElement.textContent = "새로운 세번째 자식"; // textContent로
            $newElement.className = "new";
            $container.replaceChild($newElement,$target);  // replace with은 순서 상관없이 앞에있는걸 (새거)로 바꿔줘니까 그게 더 편한듯.
      }
    </script>
    
</body>
</html>
